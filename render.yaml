services:
  - type: web
    name: supermarket-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npx prisma db push && npx prisma db seed && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: supermarket-db
          property: externalConnectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://mark1-gray.vercel.app
      - key: SUPERADMIN_PHONE
        sync: false

databases:
  - name: supermarket-db
    plan: free
    region: oregon
